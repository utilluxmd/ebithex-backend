# -- JWT (valeurs de test uniquement) -------------------------------------------
ebithex.security.jwt.secrets=ebithex-jwt-secret-for-integration-tests-only!
ebithex.security.jwt.expiration=3600000
ebithex.security.jwt.refresh-expiration=604800000

# -- Chiffrement AES-256 (32 bytes = YWZyaXBheS10ZXN0LWtleS0zMmJ5dGVzLWV4YWN0bHk=) --
# "ebithex-test-key-32bytes-exactly"
ebithex.security.encryption.key=YWZyaXBheS10ZXN0LWtleS0zMmJ5dGVzLWV4YWN0bHk=

# -- CORS ------------------------------------------------------------------------
ebithex.security.cors.allowed-origins=*

# -- Taux de frais ---------------------------------------------------------------
ebithex.fees.default-rate=1.0
ebithex.fees.mtn-momo-rate=0.8
ebithex.fees.orange-money-rate=0.9
ebithex.fees.wave-rate=0.7
ebithex.fees.payout-rate=0.5

# -- Notifications desactivees en tests -----------------------------------------
ebithex.notification.enabled=false
ebithex.notification.from-email=test@ebithex.io
spring.mail.host=localhost
spring.mail.port=3025

# -- Flyway - migrations sur le PostgreSQL Testcontainers -----------------------
spring.flyway.locations=classpath:db/migration

# -- JPA - laisser Flyway gerer le schema ---------------------------------------
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.springframework.security=TRACE
logging.level.com.ebithex.auth.security=TRACE

# -- Webhooks --------------------------------------------------------------------
ebithex.webhooks.max-retries=3
ebithex.webhooks.retry-delay-ms=100
ebithex.webhooks.timeout-seconds=5

# -- Rate limiting : fail-open (Redis peut ne pas etre configure) ----------------
# Redis est configure dynamiquement par Testcontainers via @DynamicPropertySource

# -- Circuit breaker : seuils genereux pour ne pas gener les tests --------------
resilience4j.circuitbreaker.instances.operator-payment.registerHealthIndicator=false
resilience4j.circuitbreaker.instances.operator-disbursement.registerHealthIndicator=false

# -- Operateurs : pas de cles API reelles necessaires (OperatorGateway mocke) ---
ebithex.operators.mtn-ci.base-url=http://localhost:9999
ebithex.operators.orange-ci.base-url=http://localhost:9999
ebithex.operators.wave.base-url=http://localhost:9999

# -- Sandbox datasource pool (small for tests) -----------------------------------
ebithex.datasource.sandbox.hikari.maximum-pool-size=3
ebithex.datasource.sandbox.hikari.minimum-idle=1

# -- Actuator --------------------------------------------------------------------
management.endpoints.web.exposure.include=health
management.health.mail.enabled=false