# ============================================================
#  Ebithex Backend - Profil PRODUCTION
#
#  Tous les secrets DOIVENT venir de variables d'environnement
#  ou d'un secret manager (Vault, AWS Secrets Manager...).
#  Aucune valeur par defaut pour les credentials sensibles.
#
#  Activation : SPRING_PROFILES_ACTIVE=prod
# ============================================================

# -- Base de donnees ------------------------------------------
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Sandbox pool (prod) — smaller, sandbox traffic is minimal in production
ebithex.datasource.sandbox.hikari.maximum-pool-size=5
ebithex.datasource.sandbox.hikari.minimum-idle=1

# -- Redis ----------------------------------------------------
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=2000ms

# -- JWT ------------------------------------------------------
# Virgule-separee : index 0 = cle active, index 1+ = anciens secrets (periode de grace)
ebithex.security.jwt.secrets=${JWT_SECRETS}
ebithex.security.jwt.expiration=900000
ebithex.security.jwt.refresh-expiration=604800000

# -- Chiffrement AES-256 --------------------------------------
ebithex.security.encryption.key=${ENCRYPTION_KEY}

# -- CORS -----------------------------------------------------
ebithex.security.cors.allowed-origins=${CORS_ORIGINS}

# -- URL de base ----------------------------------------------
ebithex.app.base-url=${APP_BASE_URL}

# -- Webhooks -------------------------------------------------
ebithex.webhooks.signing-secret=${WEBHOOK_SECRET}

# -- Operateurs (production) ----------------------------------
