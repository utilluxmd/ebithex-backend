ebithex.operators.wave.api-key=${WAVE_API_KEY}
ebithex.operators.wave.callback-secret=${WAVE_CALLBACK_SECRET}
ebithex.operators.wave.success-url=${APP_BASE_URL}/payment/success
ebithex.operators.wave.error-url=${APP_BASE_URL}/payment/error

# -- Mail (SMTP transactionnel — Sendgrid, SES, Postmark...) ------------------
spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# -- KYC Document Storage (S3 / Cloudflare R2) ----------------
ebithex.kyc.storage.provider=s3
ebithex.kyc.storage.s3.bucket=${KYC_S3_BUCKET}
ebithex.kyc.storage.s3.region=${KYC_S3_REGION}
ebithex.kyc.storage.s3.endpoint=${KYC_S3_ENDPOINT:}
ebithex.kyc.storage.s3.access-key=${KYC_S3_ACCESS_KEY}
ebithex.kyc.storage.s3.secret-key=${KYC_S3_SECRET_KEY}
ebithex.kyc.auto-submit-to-provider=${KYC_AUTO_SUBMIT:false}
# Set to true only once Smile Identity / Sumsub integration is completed
ebithex.kyc.provider.smile.enabled=${KYC_SMILE_ENABLED:false}
ebithex.kyc.provider.smile.partner-id=${KYC_SMILE_PARTNER_ID:}
ebithex.kyc.provider.smile.api-key=${KYC_SMILE_API_KEY:}
ebithex.kyc.provider.sumsub.enabled=${KYC_SUMSUB_ENABLED:false}
ebithex.kyc.provider.sumsub.app-token=${KYC_SUMSUB_APP_TOKEN:}
ebithex.kyc.provider.sumsub.secret-key=${KYC_SUMSUB_SECRET_KEY:}

# -- Logging --------------------------------------------------
logging.level.com.ebithex=WARN
logging.level.root=WARN

# -- Actuator : details uniquement pour les utilisateurs authentifies ---------
management.endpoint.health.show-details=when-authorized

# -- Distributed Tracing (OpenTelemetry) ----------------------
management.tracing.enabled=true
management.tracing.sampling.probability=0.1
management.otlp.tracing.endpoint=${OTEL_ENDPOINT:http://localhost:4318/v1/traces}