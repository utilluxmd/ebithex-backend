# ============================================================
#  Ebithex Backend - Configuration de base (tous profils)
#
#  Ce fichier contient uniquement les proprietes stables
#  et invariantes entre les environnements.
#  Les secrets, URLs et credentials sont dans les profils :
#    application-local.properties   - dev local (git-ignored)
#    application-dev.properties     - environnement de dev/staging
#    application-prod.properties    - production
# ============================================================

# -- Serveur --------------------------------------------------
server.port=8080
server.servlet.context-path=/api
# Arrêt gracieux : attend la fin des requêtes en cours (max 30 s) avant de terminer le processus
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
# Résolution de l'IP client depuis X-Forwarded-For uniquement si la requête provient
# d'un proxy de confiance (plages RFC-1918). Prévient le spoofing de X-Forwarded-For
# par des clients malveillants pour contourner le rate limiting par IP et les IP allowlists.
server.forward-headers-strategy=NATIVE

# -- Upload multipart (KYC documents) -------------------------
# Max par fichier : 8 MB (passeports, cartes d'identité haute résolution)
# Max par requête : 10 MB (marge pour les métadonnées multipart)
spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=10MB

# -- Virtual Threads (Java 21) --------------------------------
# Tomcat utilise des virtual threads au lieu de platform threads
spring.threads.virtual.enabled=true

# -- Application ----------------------------------------------
spring.application.name=ebithex-backend

# -- JPA / Hibernate ------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
# spring.jpa.properties.hibernate.dialect — retiré : Hibernate 6+ détecte automatiquement PostgreSQL
spring.jpa.show-sql=false

# -- Flyway ---------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# -- Actuator -------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.group.operators.include=operator
# show-details=when-authorized : évite l'exposition de l'état des CBs, Redis, DB à tout appelant
management.endpoint.health.show-details=when-authorized
management.endpoint.health.roles=ACTUATOR_ADMIN
management.info.env.enabled=false
management.health.status.order=DOWN,WARNING,UP,UNKNOWN
management.health.status.http-mapping.WARNING=200

# -- Springdoc / Swagger --------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# -- Frais (communs a tous les environnements) ----------------
ebithex.fees.default-rate=1.0
ebithex.fees.mtn-momo-rate=0.8
ebithex.fees.orange-money-rate=0.9
ebithex.fees.wave-rate=0.7
# Taux de frais pour les decaissements (cash-out)
ebithex.fees.payout-rate=0.5

# -- Webhooks -------------------------------------------------
ebithex.webhooks.max-retries=5
ebithex.webhooks.retry-delay-ms=5000
ebithex.webhooks.timeout=10s

# -- Rate Limiting --------------------------------------------
# Plans definis dans RateLimitPlan.java :
#   ANONYMOUS  : 10 req/min,   300 req/h  (par IP)
#   STANDARD   : 60 req/min,  3000 req/h  (MERCHANT, AGENT)
#   PREMIUM    : 300 req/min, 10000 req/h  (MERCHANT_KYC_VERIFIED)
# Fail-safe si Redis indisponible : bascule automatiquement sur un fallback en mémoire locale.
# Le rate limiting reste actif (pas de fail-open / désactivation totale).
ebithex.rate-limiting.enabled=true

# -- Circuit Breaker (Resilience4j) ---------------------------
# operator-payment : collection Mobile Money (MTN, Orange, Wave)
resilience4j.circuitbreaker.instances.operator-payment.register-health-indicator=true
resilience4j.circuitbreaker.instances.operator-payment.sliding-window-size=10
resilience4j.circuitbreaker.instances.operator-payment.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.operator-payment.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.operator-payment.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.operator-payment.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.operator-payment.automatic-transition-from-open-to-half-open-enabled=true

# operator-disbursement : decaissements Mobile Money
resilience4j.circuitbreaker.instances.operator-disbursement.register-health-indicator=true
resilience4j.circuitbreaker.instances.operator-disbursement.sliding-window-size=10
resilience4j.circuitbreaker.instances.operator-disbursement.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.operator-disbursement.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.operator-disbursement.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.operator-disbursement.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.operator-disbursement.automatic-transition-from-open-to-half-open-enabled=true

# Circuit breaker pour les vérifications de solde (tolérance plus haute — non critique)
resilience4j.circuitbreaker.instances.operator-balance.register-health-indicator=true
resilience4j.circuitbreaker.instances.operator-balance.sliding-window-size=5
resilience4j.circuitbreaker.instances.operator-balance.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.operator-balance.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.operator-balance.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.operator-balance.automatic-transition-from-open-to-half-open-enabled=true

# -- Securite - Protection brute-force ------------------------
# Nombre de tentatives de login echouees avant verrouillage
ebithex.security.login.max-attempts=5
# Duree du verrouillage en minutes
ebithex.security.login.lockout-duration-minutes=15
# Duree de validite de l'ancienne cle API apres rotation (grace period)
# Permet aux systemes client de migrer sans coupure de service
ebithex.security.api-key.grace-period-hours=24
# Nombre de jours d'inactivite avant envoi d'un rappel de rotation
ebithex.security.api-key.aging-alert-days=60
# Cron du job de rappel de vieillissement (08:00 UTC)
ebithex.security.api-key.aging-cron=0 0 8 * * *
# Cron du job de desactivation pour rotation forcee depassee (08:05 UTC)
ebithex.security.api-key.forced-rotation-cron=0 5 8 * * *

# -- Outbox - retention des evenements traites ----------------
# Les evenements DISPATCHED/FAILED plus anciens que ce delai sont purges a 3h du matin
ebithex.outbox.retention-days=30

# -- Expiration des transactions / payouts ---------------------
# Intervalle de verification en ms (defaut : 60 secondes)
ebithex.expiration.check-interval-ms=60000

# -- Timeout requetes -----------------------------------------
# Timeout global pour les requetes MVC asynchrones (30 secondes)
spring.mvc.async.request-timeout=30000
# Timeout Tomcat au niveau connexion TCP (legerement superieur pour laisser MVC repondre)
server.tomcat.connection-timeout=35s
# Seuil RequestTimeoutFilter - log warning + 503 si depasse
ebithex.request.max-duration-ms=30000

# -- Notifications email ---------------------------------------
ebithex.notification.from-email=noreply@ebithex.io
ebithex.notification.enabled=true
# Destinataire des alertes internes (float bas, incidents)
ebithex.notification.finance-alert-email=finance@ebithex.io
# spring.mail.* configure par profil (local/dev/prod)

# -- AML (Anti-Money Laundering) ------------------------------
# Seuils de vélocité — nombre max de transactions non-test avant alerte
ebithex.aml.velocity.max-tx-per-hour=20
ebithex.aml.velocity.max-tx-per-day=100
ebithex.aml.velocity.max-tx-per-week=500
# Seuil de montant élevé (dans la devise de la transaction)
ebithex.aml.high-amount-threshold=5000000

# -- Sanctions screening ---------------------------------------
ebithex.sanctions.enabled=true
# Liste ISO 3166-1 alpha-2 des pays à haut risque (séparés par des virgules)
ebithex.sanctions.high-risk-countries=IR,KP,SY,CU,SD,BY,RU,MM,AF,YE,SO,SS,LY,ZW,IQ,VE
# Seuil Jaro-Winkler de blocage immédiat (CRITICAL — transaction bloquée)
# 0.95 ≈ quasi-certitude (ex. "OSAMA BIN LADEN" vs "USAMA BIN LADEN" → 0.956)
ebithex.sanctions.match-threshold-block=0.95
# Seuil Jaro-Winkler de révision (HIGH — transaction poursuivie, alerte créée)
# 0.80 ≈ probable (ex. "MUAMMAR GADDAFI" vs "MUAMMAR KADHAFI" → 0.947 → near-miss)
ebithex.sanctions.match-threshold-review=0.80

# -- Synchronisation des listes de sanctions -------------------
# Active/désactive le job de synchronisation automatique hebdomadaire
ebithex.sanctions.sync.enabled=true
# Cron du job de synchronisation (défaut: dimanche 05:00 UTC — hors pic de trafic)
ebithex.sanctions.sync.cron=0 0 5 * * SUN
# Timeout HTTP pour le téléchargement des listes (secondes)
ebithex.sanctions.sync.timeout-seconds=60
# Taille de batch pour l'insertion en base
ebithex.sanctions.sync.batch-size=500
# URLs des sources officielles (remplaçables par des proxies internes)
ebithex.sanctions.sync.ofac-url=https://www.treasury.gov/ofac/downloads/sdn.xml
ebithex.sanctions.sync.un-url=https://scsanctions.un.org/resources/xml/en/consolidated.xml
ebithex.sanctions.sync.eu-url=https://webgate.ec.europa.eu/fsd/fsf/public/files/xmlFullSanctionsList_1_1/content

# webhook-delivery : livraison HTTP vers les endpoints marchands
# Tolérance plus haute (60%) car les timeouts réseau sont fréquents
resilience4j.circuitbreaker.instances.webhook-delivery.register-health-indicator=false
resilience4j.circuitbreaker.instances.webhook-delivery.sliding-window-size=10
resilience4j.circuitbreaker.instances.webhook-delivery.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.webhook-delivery.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.webhook-delivery.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.webhook-delivery.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.webhook-delivery.automatic-transition-from-open-to-half-open-enabled=true

# -- Settlement ------------------------------------------------
# Cron du cycle quotidien de règlement (défaut: 01:00 UTC chaque jour)
ebithex.settlement.cron=0 0 1 * * *

# -- Réconciliation opérateur ----------------------------------
# Cron du job de réconciliation automatique (défaut: 02:30 UTC)
ebithex.reconciliation.cron=0 30 2 * * *

# -- PII data retention ----------------------------------------
# Durée de rétention des données personnelles (phone_number) en années
ebithex.pii.retention-years=5
# Taille de batch pour la purge (nombre de lignes par transaction Spring)
ebithex.pii.batch-size=200
# Cron du job de purge PII (défaut: 03:00 UTC chaque jour)
ebithex.pii.cron=0 0 3 * * *

# -- HikariCP (datasource principale) -------------------------
# connection-timeout : délai max pour obtenir une connexion du pool (10 s)
spring.datasource.hikari.connection-timeout=10000
# idle-timeout : libère une connexion inactive après 10 min
spring.datasource.hikari.idle-timeout=600000
# max-lifetime : renouvellement des connexions toutes les 30 min (< PostgreSQL idle_in_transaction_session_timeout)
spring.datasource.hikari.max-lifetime=1800000
# validation-timeout : timeout de la requête de test de connexion (3 s)
spring.datasource.hikari.validation-timeout=3000
# connectionTestQuery : requête légère pour valider les connexions récupérées du pool
spring.datasource.hikari.connection-test-query=SELECT 1
# leak-detection-threshold : alerte si une connexion est tenue plus de 60 s (0 = désactivé en dev)
spring.datasource.hikari.leak-detection-threshold=60000

# -- Sandbox datasource pool (override per environment) -------
# Sandbox gets a smaller pool since traffic is lighter than prod
ebithex.datasource.sandbox.hikari.maximum-pool-size=5
ebithex.datasource.sandbox.hikari.minimum-idle=1

# -- Distributed Tracing (OpenTelemetry) ----------------------
# Active en prod (application-prod.properties) - desactive par defaut
management.tracing.enabled=false
# Taux d'echantillonnage : 0.0 = aucun, 1.0 = tout, 0.1 = 10%
management.tracing.sampling.probability=0.1
# Endpoint OTLP (Jaeger, Grafana Tempo, Datadog Agent...)
management.otlp.tracing.endpoint=${OTEL_ENDPOINT:http://localhost:4318/v1/traces}
# Propagation W3C TraceContext + Baggage (interoperable avec tous les vendors)
management.tracing.propagation.type=w3c
