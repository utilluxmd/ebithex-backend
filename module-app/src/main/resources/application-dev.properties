# ============================================================
#  Ebithex Backend - Profil DEV / STAGING
#
#  Environnement de developpement partage / staging.
#  Tous les secrets viennent de variables d'environnement.
#  Les operateurs utilisent le sandbox.
#
#  Activation : SPRING_PROFILES_ACTIVE=dev
# ============================================================

# -- Base de donnees ------------------------------------------
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:ebithex_dev}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3

# Sandbox pool (dev/staging)
ebithex.datasource.sandbox.hikari.maximum-pool-size=5
ebithex.datasource.sandbox.hikari.minimum-idle=1

# -- Redis ----------------------------------------------------
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms

# -- JWT ------------------------------------------------------
# Virgule-separee : index 0 = cle active, index 1+ = anciens secrets (periode de grace)
ebithex.security.jwt.secrets=${JWT_SECRETS}
ebithex.security.jwt.expiration=900000
ebithex.security.jwt.refresh-expiration=604800000

# -- Chiffrement AES-256 --------------------------------------
ebithex.security.encryption.key=${ENCRYPTION_KEY}

# -- CORS -----------------------------------------------------
ebithex.security.cors.allowed-origins=${CORS_ORIGINS:http://dev.ebithex.io}

# -- URL de base ----------------------------------------------
ebithex.app.base-url=${APP_BASE_URL:https://api-dev.ebithex.io}

# -- Webhooks -------------------------------------------------
ebithex.webhooks.signing-secret=${WEBHOOK_SECRET}

# -- Operateurs (sandbox) -------------------------------------
# Marche principal : Senegal (+221)

# MTN MoMo - Cote d'Ivoire (+225)
ebithex.operators.mtn-ci.base-url=https://sandbox.momodeveloper.mtn.com
ebithex.operators.mtn-ci.environment=sandbox
ebithex.operators.mtn-ci.subscription-key=${MTN_CI_SUBSCRIPTION_KEY}
ebithex.operators.mtn-ci.api-user=${MTN_CI_API_USER}
ebithex.operators.mtn-ci.api-key=${MTN_CI_API_KEY}
ebithex.operators.mtn-ci.callback-secret=${MTN_CI_CALLBACK_SECRET}
ebithex.operators.mtn-ci.callback-url=${APP_BASE_URL:https://api-dev.ebithex.io}/api/v1/callbacks/mtn-ci
ebithex.operators.mtn-ci.disbursement-api-user=${MTN_CI_DISBURSEMENT_API_USER:${MTN_CI_API_USER}}
ebithex.operators.mtn-ci.disbursement-api-key=${MTN_CI_DISBURSEMENT_API_KEY:${MTN_CI_API_KEY}}
ebithex.operators.mtn-ci.disbursement-subscription-key=${MTN_CI_DISBURSEMENT_SUB_KEY:${MTN_CI_SUBSCRIPTION_KEY}}
ebithex.operators.mtn-ci.disbursement-callback-url=${APP_BASE_URL:https://api-dev.ebithex.io}/api/v1/callbacks/mtn-ci-disbursement

# MTN MoMo - Benin (+229)
ebithex.operators.mtn-bj.base-url=https://sandbox.momodeveloper.mtn.com
ebithex.operators.mtn-bj.environment=sandbox
ebithex.operators.mtn-bj.subscription-key=${MTN_BJ_SUBSCRIPTION_KEY}
ebithex.operators.mtn-bj.api-user=${MTN_BJ_API_USER}
ebithex.operators.mtn-bj.api-key=${MTN_BJ_API_KEY}
ebithex.operators.mtn-bj.callback-secret=${MTN_BJ_CALLBACK_SECRET}
ebithex.operators.mtn-bj.callback-url=${APP_BASE_URL:https://api-dev.ebithex.io}/api/v1/callbacks/mtn-bj

# Orange Money - Cote d'Ivoire (+225)
ebithex.operators.orange-ci.base-url=https://api.orange.com/orange-money-webpay/ci/v1
ebithex.operators.orange-ci.client-id=${ORANGE_CI_CLIENT_ID}
ebithex.operators.orange-ci.client-secret=${ORANGE_CI_CLIENT_SECRET}
ebithex.operators.orange-ci.merchant-key=${ORANGE_CI_MERCHANT_KEY}
ebithex.operators.orange-ci.callback-secret=${ORANGE_CI_CALLBACK_SECRET}
ebithex.operators.orange-ci.notif-url=${APP_BASE_URL:https://api-dev.ebithex.io}/api/v1/callbacks/orange-ci
ebithex.operators.orange-ci.return-url=${APP_BASE_URL:https://api-dev.ebithex.io}/payment/success
ebithex.operators.orange-ci.cancel-url=${APP_BASE_URL:https://api-dev.ebithex.io}/payment/cancel

# Orange Money - Senegal (+221)
ebithex.operators.orange-sn.base-url=https://api.orange.com/orange-money-webpay/sn/v1
ebithex.operators.orange-sn.client-id=${ORANGE_SN_CLIENT_ID}
ebithex.operators.orange-sn.client-secret=${ORANGE_SN_CLIENT_SECRET}
ebithex.operators.orange-sn.merchant-key=${ORANGE_SN_MERCHANT_KEY}
ebithex.operators.orange-sn.callback-secret=${ORANGE_SN_CALLBACK_SECRET}
ebithex.operators.orange-sn.notif-url=${APP_BASE_URL:https://api-dev.ebithex.io}/api/v1/callbacks/orange-sn
ebithex.operators.orange-sn.return-url=${APP_BASE_URL:https://api-dev.ebithex.io}/payment/success
ebithex.operators.orange-sn.cancel-url=${APP_BASE_URL:https://api-dev.ebithex.io}/payment/cancel

# Wave - Cote d'Ivoire + Senegal (API unifiee)
ebithex.operators.wave.base-url=https://api.wave.com/v1
ebithex.operators.wave.api-key=${WAVE_API_KEY}
ebithex.operators.wave.callback-secret=${WAVE_CALLBACK_SECRET}
ebithex.operators.wave.success-url=${APP_BASE_URL:https://api-dev.ebithex.io}/payment/success
ebithex.operators.wave.error-url=${APP_BASE_URL:https://api-dev.ebithex.io}/payment/error

# -- Mail -----------------------------------------------------
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:1025}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
ebithex.notification.enabled=${NOTIFICATION_ENABLED:false}

# -- KYC Document Storage (S3-compatible) ---------------------
ebithex.kyc.storage.provider=${KYC_STORAGE_PROVIDER:local}
ebithex.kyc.storage.s3.bucket=${KYC_S3_BUCKET:ebithex-kyc-dev}
ebithex.kyc.storage.s3.region=${KYC_S3_REGION:auto}
ebithex.kyc.storage.s3.endpoint=${KYC_S3_ENDPOINT:}
ebithex.kyc.storage.s3.access-key=${KYC_S3_ACCESS_KEY:}
ebithex.kyc.storage.s3.secret-key=${KYC_S3_SECRET_KEY:}
ebithex.kyc.auto-submit-to-provider=false
ebithex.kyc.provider.mock.enabled=${KYC_MOCK_ENABLED:true}

# -- Logging --------------------------------------------------
logging.level.com.ebithex=INFO
logging.level.org.springframework.security=WARN
